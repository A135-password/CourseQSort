<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学生选课系统</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.bootcdn.net/ajax/libs/bootstrap-icons/1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="#">选课系统</a>
            <div class="d-flex align-items-center">
                <span class="badge bg-light text-dark me-2" id="data-source-badge">预览模式</span>
                <span class="navbar-text me-3" id="student-name-display">同学，你好</span>
                <button class="btn btn-outline-light btn-sm me-2" id="print-btn">打印课表</button>
                <button class="btn btn-outline-light btn-sm" id="logout-btn">退出登录</button>
            </div>
        </div>
    </nav>

    <!-- 加载动画 -->
    <div id="loading-overlay" class="loading-overlay" style="display:none;">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">加载中...</span>
        </div>
        <p class="mt-2 text-muted">正在加载课程数据...</p>
    </div>

    <div class="container-fluid my-4">
        <div class="row">
            <!-- 左侧课程列表 -->
            <div class="col-md-9">
                <div class="card shadow-sm">
                    <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
                        <h5 class="mb-0">可选课程列表</h5>
                        <div>
                            <span class="badge bg-light text-dark me-2" id="total-credits">0 学分</span>
                            <span class="badge bg-light text-dark" id="course-count-badge">共 0 门</span>
                        </div>
                    </div>
                    <div class="card-body p-0">
                        <table class="table table-hover mb-0" id="course-table">
                            <thead>
                                <tr>
                                    <th>课程名称</th>
                                    <th>学分</th>
                                    <th>教师</th>
                                    <th>时间</th>
                                    <th>余量</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody id="course-list"></tbody>
                        </table>
                    </div>
                    <!-- 分页 -->
                    <div class="card-footer d-flex justify-content-between align-items-center py-2">
                        <small class="text-muted" id="pagination-info">第 1 页</small>
                        <div>
                            <!-- 分页按钮去掉 disabled，由 JS 初始控制 -->
                            <button class="btn btn-sm btn-outline-primary" id="prev-page-btn">上一页</button>
                            <button class="btn btn-sm btn-outline-primary" id="next-page-btn">下一页</button>
                        </div>
                    </div>
                </div>
            </div>
            <!-- 右侧已选 + 空闲时段 -->
            <div class="col-md-3">
                <div class="card shadow-sm mb-3">
                    <div class="card-header bg-success text-white"><h6 class="mb-0">已选课程</h6></div>
                    <div class="card-body p-2" id="selected-list">
                        <p class="text-muted small mb-0">加载中...</p>
                    </div>
                </div>
                <div class="card shadow-sm">
                    <div class="card-header bg-info text-white"><h6 class="mb-0">空闲时段 (点击筛选)</h6></div>
                    <div class="card-body p-2" id="free-slots-list">
                        <p class="text-muted small mb-0">加载中...</p>
                    </div>
                </div>
                <div class="position-fixed" id="conflict-popover" style="display:none; z-index:2000;"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.bootcdn.net/ajax/libs/popper.js/2.11.6/umd/popper.min.js"></script>
    <script src="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.0/js/bootstrap.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
