<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教师课表</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.bootcdn.net/ajax/libs/bootstrap-icons/1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root { --cell-min-height: 74px; --time-width: 72px; }
        body { font-family: "Microsoft YaHei","PingFang SC",sans-serif; background: #f5f7fa; }
        .timetable-wrapper { overflow-x: auto; }
        .timetable { border-collapse: collapse; width: 100%; min-width: 780px; table-layout: fixed; }
        .timetable th, .timetable td { border: 1px solid #d0d5dd; text-align: center; vertical-align: middle; }
        .timetable thead th { background: #f0f3f7; font-weight: 600; font-size: 14px; padding: 10px 0; color: #344054; }
        .timetable thead th:first-child { width: var(--time-width); background: #e8ecf1; }
        .timetable .time-col { background: #f8f9fb; font-size: 12px; color: #667085; font-weight: 500; width: var(--time-width); }
        .timetable td { height: var(--cell-min-height); padding: 4px; position: relative; }
        .course-block { display: block; border-radius: 6px; padding: 4px 5px; font-size: 11px; line-height: 1.35; color: #fff; text-align: left; margin: 1px 0; overflow: hidden; }
        .course-block.professional { background: linear-gradient(135deg, #4f7cff, #3b5fd9); }
        .course-block.elective { background: linear-gradient(135deg, #f09b4a, #d4782c); }
        .course-block.general { background: linear-gradient(135deg, #4cb782, #369b63); }
        .course-block .c-name { font-weight: 600; font-size: 12px; }
        .course-block .c-info { font-size: 10px; opacity: .85; }
        @media print { body { background: #fff; } #page-header { display: none; } }
    </style>
</head>
<body>

<div id="page-header">
    <nav class="navbar navbar-light bg-white border-bottom shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#"><i class="bi bi-person-badge me-2"></i>教师课表</a>
            <div class="d-flex align-items-center gap-2">
                <span class="navbar-text me-2" id="teacher-info-display"></span>
                <span class="badge bg-secondary me-2" id="data-mode-badge">预览模式</span>
                <button class="btn btn-outline-secondary btn-sm" onclick="window.print()"><i class="bi bi-printer"></i> 打印</button>
                <button class="btn btn-outline-primary btn-sm" onclick="window.location.href='login.html'"><i class="bi bi-box-arrow-right"></i> 退出</button>
            </div>
        </div>
    </nav>
</div>

<div class="container my-4">
    <!-- 教师信息卡片 -->
    <div class="card shadow-sm mb-3">
        <div class="card-body py-2 d-flex align-items-center gap-4">
            <div><i class="bi bi-person-circle text-info" style="font-size:2rem;"></i></div>
            <div>
                <h5 class="mb-0" id="teacher-name">—</h5>
                <small class="text-muted" id="teacher-meta">工号: — | 学院: —</small>
            </div>
            <div class="ms-auto text-end">
                <span class="badge bg-info" id="course-count">0 门课</span>
                <span class="badge bg-secondary" id="hour-count">0 学时/周</span>
            </div>
        </div>
    </div>

    <!-- 加载 -->
    <div id="loading-msg" class="text-center py-5 text-muted">
        <div class="spinner-border mb-2" style="width:2rem;height:2rem;"></div>
        <p>正在加载课表...</p>
    </div>

    <!-- 课表 -->
    <div class="card shadow-sm" id="timetable-card" style="display:none;">
        <div class="card-body p-2 timetable-wrapper">
            <table class="timetable" id="timetable-grid">
                <thead><tr><th>节次</th><th>周一</th><th>周二</th><th>周三</th><th>周四</th><th>周五</th></tr></thead>
                <tbody id="timetable-body"></tbody>
            </table>
        </div>
    </div>

    <div id="empty-msg" class="text-center py-5 text-muted" style="display:none;">
        <i class="bi bi-calendar-x" style="font-size:3rem;"></i>
        <p class="mt-2">该教师暂无排课数据</p>
    </div>
</div>

<script src="js/api.js"></script>
<script>
(function() {
    // 登录守卫：JWT 模式检查 token，预览模式检查 sessionStorage
    if (!CourseQSortAPI.isAuthenticated()) {
        window.location.href = 'login.html';
        return;
    }
    var PERIOD_NAMES = ['','第1节','第2节','第3节','第4节','第5节','第6节','第7节','第8节','第9节','第10节','第11节'];
    var PERIOD_MAP = {1:'08:00-08:45',2:'08:55-09:40',3:'10:00-10:45',4:'10:55-11:40',5:'12:00-13:30',6:'14:00-14:45',7:'14:55-15:40',8:'16:00-16:45',9:'16:55-17:40',10:'19:00-19:45',11:'19:55-20:40'};

    var teacherId = sessionStorage.getItem('teacherId') || '';
    var teacherName = sessionStorage.getItem('teacherName') || '教师';
    var teacherDept = sessionStorage.getItem('teacherDept') || '';

    document.getElementById('teacher-name').textContent = teacherName || '未指定教师';
    document.getElementById('teacher-meta').textContent = '编号: ' + (teacherId || '—') + ' | 学院: ' + (teacherDept || '—');
    document.getElementById('data-mode-badge').textContent = CourseQSortAPI.isMockMode() ? '预览模式' : '后端模式';

    var loadingEl = document.getElementById('loading-msg');
    var cardEl = document.getElementById('timetable-card');
    var emptyEl = document.getElementById('empty-msg');
    var tbody = document.getElementById('timetable-body');

    function getCategoryClass(c) {
        var name = (c.name || '').toLowerCase();
        if (name.indexOf('体育') !== -1) return 'pe';
        if (c.is_professional_course || c.is_professional) return 'professional';
        return 'general';
    }

    function renderGrid(courses) {
        if (!courses || courses.length === 0) {
            loadingEl.style.display = 'none'; emptyEl.style.display = 'block'; return;
        }

        var grid = new Array(6);
        for (var d = 1; d <= 5; d++) { grid[d] = new Array(12); for (var p = 1; p <= 11; p++) grid[d][p] = []; }

        courses.forEach(function(c) {
            var slots = c.time_slots || [];
            slots.forEach(function(s) {
                var d = s.day_of_week || s.day || 1;
                var p = s.period;
                if (d >= 1 && d <= 5 && p >= 1 && p <= 11) {
                    grid[d][p].push({
                        name: c.name || '', teacher: c.teacher || '',
                        classroom: c.classroom || '',
                        credit: c.credit, is_professional: c.is_professional_course || c.is_professional,
                        studentCount: c.expected_student_count || c.enrolled_count || ''
                    });
                }
            });
        });

        var html = '';
        for (var p = 1; p <= 11; p++) {
            var timeLabel = PERIOD_NAMES[p] + '<br><small class="text-muted" style="font-size:10px;">' + (PERIOD_MAP[p] || '') + '</small>';
            html += '<tr><td class="time-col">' + timeLabel + '</td>';
            for (var d = 1; d <= 5; d++) {
                html += '<td>';
                grid[d][p].forEach(function(c) {
                    var cls = 'course-block ' + getCategoryClass(c);
                    html += '<div class="' + cls + '" title="课程: ' + c.name + '&#10;教室: ' + (c.classroom || '未定') + '&#10;学生数: ' + (c.studentCount || '—') + '">';
                    html += '<div class="c-name">' + c.name + '</div>';
                    if (c.classroom) html += '<div class="c-info">📍 ' + c.classroom + '</div>';
                    if (c.studentCount) html += '<div class="c-info">👥 ' + c.studentCount + ' 人</div>';
                    html += '</div>';
                });
                html += '</td>';
            }
            html += '</tr>';
        }
        tbody.innerHTML = html;

        var totalHours = courses.reduce(function(sum, c) { return sum + (c.time_slots ? c.time_slots.length : 0); }, 0);
        document.getElementById('course-count').textContent = courses.length + ' 门课';
        document.getElementById('hour-count').textContent = totalHours + ' 学时/周';

        loadingEl.style.display = 'none'; cardEl.style.display = 'block';
    }

    // ---- 加载教师课程 ----
    function loadTeacherCourses() {
        if (CourseQSortAPI.isMockMode()) {
            // Mock 模式：从本地数据按教师姓名匹配
            var allCourses = CourseQSortAPI._getMockCourseList({page_size: 200});
            var results = allCourses.results || [];
            // 按教师姓名匹配
            var teacherCourses = results.filter(function(c) {
                return c.teacher === teacherName;
            });
            // 如果需要更精确匹配（按 teacherId）
            if (teacherCourses.length === 0 && teacherId) {
                // fallback: 用一个简单的映射
                var MOCK_TEACHER_NAMES = {1:'张教授',2:'李老师',3:'王教授',4:'赵教授',5:'陈老师'};
                var nameFromId = MOCK_TEACHER_NAMES[teacherId];
                if (nameFromId) {
                    teacherCourses = results.filter(function(c) { return c.teacher === nameFromId; });
                }
            }
            renderGrid(teacherCourses);
        } else {
            // 后端模式：调 API
            fetch(CourseQSortAPI.getBaseUrl() + '/admin/teachers/' + teacherId + '/', {
                headers: { 'Authorization': 'Bearer ' + CourseQSortAPI.token.getAccess() }
            })
            .then(function(r) { return r.json(); })
            .then(function(teacher) {
                document.getElementById('teacher-name').textContent = teacher.name || teacherName;
                document.getElementById('teacher-meta').textContent = '工号: ' + (teacher.employee_no || '—') + ' | 学院: ' + (teacher.department || '—');
                // 再获取该教师的课程
                return fetch(CourseQSortAPI.getBaseUrl() + '/admin/courses/?teacher=' + teacherId, {
                    headers: { 'Authorization': 'Bearer ' + CourseQSortAPI.token.getAccess() }
                });
            })
            .then(function(r) { return r.json(); })
            .then(function(data) {
                var courses = (data.results || []).map(function(c) {
                    return {
                        name: c.name, credit: c.credit,
                        is_professional_course: c.is_professional_course,
                        expected_student_count: c.expected_student_count,
                        time_slots: c.schedule_items ? c.schedule_items.map(function(si) {
                            return { day_of_week: si.day_of_week, period: si.period };
                        }) : [],
                        classroom: c.schedule_items && c.schedule_items[0] ? c.schedule_items[0].classroom_name : ''
                    };
                });
                renderGrid(courses);
            })
            .catch(function() {
                loadingEl.innerHTML = '<p class="text-danger">加载失败，请确认后端服务已启动</p>';
            });
        }
    }

    // 如果没有选择教师，尝试从 URL 参数获取
    if (!teacherId && !teacherName) {
        var params = new URLSearchParams(window.location.search);
        teacherId = params.get('id') || '';
        teacherName = params.get('name') || '';
        if (teacherId) sessionStorage.setItem('teacherId', teacherId);
        if (teacherName) sessionStorage.setItem('teacherName', teacherName);
    }

    if (!teacherId && !teacherName) {
        loadingEl.innerHTML = '<p class="text-warning">未指定教师，请从登录页选择教师后进入</p>';
    } else {
        loadTeacherCourses();
    }
})();
</script>
</body>
</html>
