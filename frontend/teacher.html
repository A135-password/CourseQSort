<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教师课表</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.bootcdn.net/ajax/libs/bootstrap-icons/1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root { --cell-min-height: 82px; --time-width: 72px; }
        body { font-family: "Microsoft YaHei","PingFang SC",sans-serif; background: #f5f7fa; }
        .timetable-wrapper { overflow-x: auto; }
        .timetable { border-collapse: collapse; width: 100%; min-width: 780px; table-layout: fixed; }
        .timetable th, .timetable td { border: 1px solid #d0d5dd; text-align: center; vertical-align: middle; }
        .timetable thead th { background: #f0f3f7; font-weight: 600; font-size: 14px; padding: 10px 0; color: #344054; }
        .timetable thead th:first-child { width: var(--time-width); background: #e8ecf1; }
        .timetable .time-col { background: #f8f9fb; font-size: 12px; color: #667085; font-weight: 500; width: var(--time-width); }
        .timetable td { height: var(--cell-min-height); padding: 4px; position: relative; }
        .course-block { display: block; border-radius: 6px; padding: 4px 5px; font-size: 11px; line-height: 1.35; color: #fff; text-align: left; margin: 1px 0; overflow: hidden; }
        .course-block.professional { background: linear-gradient(135deg, #4f7cff, #3b5fd9); }
        .course-block.elective { background: linear-gradient(135deg, #f09b4a, #d4782c); }
        .course-block.general { background: linear-gradient(135deg, #4cb782, #369b63); }
        .course-block.pe { background: linear-gradient(135deg, #e06070, #c43d50); }
        .course-block .c-name { font-weight: 600; font-size: 12px; }
        .course-block .c-info { font-size: 10px; opacity: .85; }
        .legend-item { display: inline-flex; align-items: center; gap: 6px; margin-right: 18px; font-size: 13px; }
        .legend-dot { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }
        @media print {
            @page { size: A4 landscape; margin: 8mm; }
            body { background: #fff; }
            #page-header, .legend-item { display: none; }
            .card { border: none !important; box-shadow: none !important; }
            .card-body { padding: 0 !important; }
            .timetable { min-width: auto; }
            .timetable thead { display: table-header-group; }
            .timetable tr { page-break-inside: avoid; break-inside: avoid; }
            .timetable td { height: auto; min-height: 38px; padding: 2px 3px; vertical-align: top; }
            .course-block { font-size: 10px; }
            .course-block .c-name { font-size: 10px; }
            .course-block .c-info { font-size: 9px; }
            .timetable .time-col { font-size: 10px; }
            .timetable thead th { padding: 6px 0; font-size: 12px; }
        }
    </style>
    <script src="js/api.js"></script>
    <script>
        if (!CourseQSortAPI.isMockMode() && !CourseQSortAPI.isAuthenticated()) {
            window.location.replace('index.html');
        }
    </script>
</head>
<body>

<div id="page-header">
    <nav class="navbar navbar-light bg-white border-bottom shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#"><i class="bi bi-person-badge me-2"></i>教师课表</a>
            <div class="d-flex align-items-center gap-3">
                <!-- 周导航 -->
                <div class="btn-group btn-group-sm" id="week-nav">
                    <button class="btn btn-outline-secondary" id="week-prev" title="上一周"><i class="bi bi-chevron-left"></i></button>
                    <select class="btn btn-outline-secondary" id="week-select" style="width:auto;"></select>
                    <button class="btn btn-outline-secondary" id="week-next" title="下一周"><i class="bi bi-chevron-right"></i></button>
                </div>
                <span class="badge bg-info" id="week-info"></span>
                <span class="navbar-text me-2" id="teacher-name-display"></span>
                <span class="badge bg-secondary" id="data-mode-badge">预览模式</span>
                <button class="btn btn-outline-secondary btn-sm" onclick="window.print()"><i class="bi bi-printer"></i> 打印</button>
                <button class="btn btn-outline-primary btn-sm" onclick="window.location.href='index.html'"><i class="bi bi-box-arrow-right"></i> 退出</button>
            </div>
        </div>
    </nav>
</div>

<div class="container my-4">
    <!-- 图例 -->
    <div class="d-flex flex-wrap align-items-center mb-3">
        <span class="legend-item"><span class="legend-dot" style="background:#4f7cff;"></span> 专业课</span>
        <span class="legend-item"><span class="legend-dot" style="background:#f09b4a;"></span> 专业选修</span>
        <span class="legend-item"><span class="legend-dot" style="background:#4cb782;"></span> 通识课</span>
        <span class="legend-item"><span class="legend-dot" style="background:#e06070;"></span> 体育课</span>
    </div>

    <!-- 教师信息卡片 -->
    <div class="card shadow-sm mb-3">
        <div class="card-body py-2 d-flex align-items-center gap-4">
            <div><i class="bi bi-person-circle text-info" style="font-size:2rem;"></i></div>
            <div>
                <h5 class="mb-0" id="teacher-name">—</h5>
                <small class="text-muted" id="teacher-meta">工号: — | 学院: —</small>
            </div>
            <div class="ms-auto text-end">
                <span class="badge bg-info" id="course-count">0 门课</span>
                <span class="badge bg-secondary" id="hour-count">0 学时/周</span>
            </div>
        </div>
    </div>

    <!-- 加载状态 -->
    <div id="loading-msg" class="text-center py-5 text-muted">
        <div class="spinner-border mb-2" style="width:2rem;height:2rem;"></div>
        <p>正在加载课表...</p>
    </div>

    <!-- 课表 -->
    <div class="card shadow-sm" id="timetable-card" style="display:none;">
        <div class="card-body p-2 timetable-wrapper">
            <table class="timetable" id="timetable-grid">
                <thead><tr><th>节次</th><th>周一</th><th>周二</th><th>周三</th><th>周四</th><th>周五</th></tr></thead>
                <tbody id="timetable-body"></tbody>
            </table>
        </div>
    </div>

    <!-- 空状态 -->
    <div id="empty-msg" class="text-center py-5 text-muted" style="display:none;">
        <i class="bi bi-calendar-x" style="font-size:3rem;"></i>
        <p class="mt-2">该教师暂无排课数据</p>
    </div>
</div>

<script>
(function() {
    // 从 localStorage 读取课表框架配置
    function loadTimetableConfig() {
        var raw = localStorage.getItem('timetableConfig');
        if (raw) {
            try {
                var tc = JSON.parse(raw);
                if (tc && tc.periods && tc.periods.length > 0) return tc;
            } catch(e) {}
        }
        return {periodsPerDay:11, totalWeeks:18, periods:[
            {name:'第1节',start:'08:00',end:'08:45'},{name:'第2节',start:'08:55',end:'09:40'},
            {name:'第3节',start:'10:00',end:'10:45'},{name:'第4节',start:'10:55',end:'11:40'},
            {name:'第5节',start:'14:00',end:'14:45'},{name:'第6节',start:'14:55',end:'15:40'},
            {name:'第7节',start:'16:00',end:'16:45'},{name:'第8节',start:'16:55',end:'17:40'},
            {name:'第9节',start:'19:00',end:'19:45'},{name:'第10节',start:'19:55',end:'20:40'},
            {name:'第11节',start:'20:50',end:'21:35'}
        ]};
    }
    var TC = loadTimetableConfig();
    var PERIODS = TC.periods;
    var PERIOD_COUNT = PERIODS.length;

    var teacherId = sessionStorage.getItem('teacherId') || '';
    var teacherName = sessionStorage.getItem('teacherName') || '教师';
    var teacherDept = sessionStorage.getItem('teacherDept') || '';

    function updateTeacherDisplay(name, dept, id) {
        document.getElementById('teacher-name').textContent = name || '未指定教师';
        document.getElementById('teacher-meta').textContent = '工号: ' + (id || teacherId || '—') + ' | 学院: ' + (dept || '—');
        document.getElementById('teacher-name-display').textContent = name || '';
    }
    updateTeacherDisplay(teacherName, teacherDept, teacherId);
    document.getElementById('data-mode-badge').textContent = CourseQSortAPI.isMockMode() ? '预览模式' : '后端模式';

    // 如果没有选择教师，尝试从 URL 参数获取
    if (!teacherId && !teacherName) {
        var params = new URLSearchParams(window.location.search);
        teacherId = params.get('id') || '';
        teacherName = params.get('name') || '';
        if (teacherId) sessionStorage.setItem('teacherId', teacherId);
        if (teacherName) sessionStorage.setItem('teacherName', teacherName);
    }

    var curWeek = 1;
    var maxWeek = TC.totalWeeks || 18;
    var allCourses = [];  // [{name, credit, is_professional_course, time_slots: [{day_of_week, period, week_start, week_end, classroom}]}]

    var loadingEl = document.getElementById('loading-msg');
    var cardEl = document.getElementById('timetable-card');
    var emptyEl = document.getElementById('empty-msg');
    var tbody = document.getElementById('timetable-body');
    var weekSelect = document.getElementById('week-select');
    var weekInfo = document.getElementById('week-info');

    function getCategoryClass(c) {
        var name = (c.name || '').toLowerCase();
        var isPro = c.is_professional_course || c.is_professional;
        if (name.indexOf('体育') !== -1 || name.indexOf('运动') !== -1) return 'pe';
        if (isPro === true) return 'professional';
        if (isPro === false) return 'elective';
        return 'professional';
    }

    function buildWeekSelector() {
        weekSelect.innerHTML = '';
        for (var w = 1; w <= maxWeek; w++) {
            var opt = document.createElement('option');
            opt.value = w;
            opt.textContent = '第' + w + '周';
            if (w === curWeek) opt.selected = true;
            weekSelect.appendChild(opt);
        }
    }

    function renderGrid() {
        console.log('[teacher] renderGrid start, curWeek=', curWeek, 'allCourses.length=', allCourses.length);
        // 展开所有课程的 time_slots，过滤当前周
        var weekSlots = [];  // [{day_of_week, period, name, classroom, credit, is_professional_course}]
        allCourses.forEach(function(c) {
            (c.time_slots || []).forEach(function(s) {
                var ws = s.week_start || 1;
                var we = s.week_end || maxWeek;
                if (curWeek >= ws && curWeek <= we) {
                    weekSlots.push({
                        day_of_week: s.day_of_week || s.day || 1,
                        period: s.period,
                        name: c.name,
                        classroom: s.classroom || '',
                        credit: c.credit,
                        is_professional_course: c.is_professional_course || c.is_professional
                    });
                }
            });
        });

        console.log('[teacher] weekSlots.length=', weekSlots.length);
        if (weekSlots.length === 0) {
            console.log('[teacher] 当前周无课程，显示空状态');
            cardEl.style.display = 'none';
            emptyEl.style.display = 'block';
            loadingEl.style.display = 'none';
            emptyEl.innerHTML = '<i class="bi bi-calendar-x" style="font-size:3rem;"></i><p class="mt-2">第 ' + curWeek + ' 周暂无课程</p>';
            weekInfo.textContent = '第 ' + curWeek + ' 周 · 0 课时';
            return;
        }

        // 5天 × PERIOD_COUNT 节
        var grid = new Array(6);
        for (var d = 1; d <= 5; d++) {
            grid[d] = new Array(PERIOD_COUNT + 1);
            for (var p = 1; p <= PERIOD_COUNT; p++) {
                grid[d][p] = [];
            }
        }

        weekSlots.forEach(function(s) {
            var d = s.day_of_week;
            var p = s.period;
            if (d >= 1 && d <= 5 && p >= 1 && p <= PERIOD_COUNT) {
                // 同一课程同一天同一时段去重
                var exists = grid[d][p].some(function(x) { return x.name === s.name; });
                if (!exists) {
                    grid[d][p].push(s);
                }
            }
        });

        var html = '';
        for (var p = 1; p <= PERIOD_COUNT; p++) {
            var pd = PERIODS[p - 1];
            var timeLabel = pd.name + '<br><small class="text-muted" style="font-size:10px;">' + pd.start + ' - ' + pd.end + '</small>';
            html += '<tr><td class="time-col">' + timeLabel + '</td>';
            for (var d = 1; d <= 5; d++) {
                var cells = grid[d][p];
                html += '<td>';
                cells.forEach(function(c) {
                    var cls = 'course-block ' + getCategoryClass(c);
                    html += '<div class="' + cls + '" title="' + c.name + '&#10;教室: ' + (c.classroom || '未定') + '">';
                    html += '<div class="c-name">' + c.name + '</div>';
                    if (c.classroom) html += '<div class="c-info">📍 ' + c.classroom + '</div>';
                    html += '</div>';
                });
                html += '</td>';
            }
            html += '</tr>';
        }
        tbody.innerHTML = html;
        console.log('[teacher] 表格已渲染, rows=', html.split('</tr>').length - 1);

        // 统计
        var totalSlots = weekSlots.length;
        var uniqueCourses = {};
        weekSlots.forEach(function(s) { uniqueCourses[s.name] = true; });
        document.getElementById('course-count').textContent = Object.keys(uniqueCourses).length + ' 门课';
        document.getElementById('hour-count').textContent = totalSlots + ' 学时/周';

        loadingEl.style.display = 'none';
        cardEl.style.display = 'block';
        emptyEl.style.display = 'none';
        console.log('[teacher] renderGrid 完成, loading隐藏, card显示, 课程数=', Object.keys(uniqueCourses).length, '课时数=', totalSlots);
        weekInfo.textContent = '第 ' + curWeek + ' 周 · ' + totalSlots + ' 课时';
    }

    function goWeek(w) {
        if (w < 1 || w > maxWeek) return;
        curWeek = w;
        weekSelect.value = w;
        renderGrid();
    }

    document.getElementById('week-prev').addEventListener('click', function() { goWeek(curWeek - 1); });
    document.getElementById('week-next').addEventListener('click', function() { goWeek(curWeek + 1); });
    weekSelect.addEventListener('change', function() { goWeek(parseInt(this.value)); });

    // ---- 加载教师课表 ----
    function loadTeacherCourses() {
        console.log('[teacher] loadTeacherCourses start, teacherId=', teacherId, 'teacherName=', teacherName, 'teacherDept=', teacherDept);
        console.log('[teacher] isMockMode=', CourseQSortAPI.isMockMode(), 'getLoginMode=', CourseQSortAPI.getLoginMode());
        console.log('[teacher] hasAccessToken=', !!CourseQSortAPI.token.getAccess());

        if (!teacherId && !teacherName) {
            console.warn('[teacher] 无 teacherId 和 teacherName，停止加载');
            loadingEl.innerHTML = '<p class="text-warning">未指定教师，请从登录页选择教师后进入</p>';
            return;
        }

        console.log('[teacher] 开始调用 API: teacher.getSchedule, teacherId=', teacherId);
        // 统一走 apiCall，mock 和后端模式自动路由
        CourseQSortAPI.teacher.getSchedule(teacherId || null)
            .then(function(data) {
                console.log('[teacher] API 返回成功, data=', data);
                if (!data) { throw new Error('无数据'); }
                if (data.teacher) {
                    console.log('[teacher] 教师信息:', data.teacher);
                    teacherName = data.teacher.name || teacherName;
                    teacherDept = data.teacher.department || teacherDept;
                    updateTeacherDisplay(teacherName, teacherDept, data.teacher.employee_no || teacherId);
                }
                allCourses = (data.courses || []);
                console.log('[teacher] 课程数:', allCourses.length, 'allCourses=', allCourses);

                // 计算最大周数
                var maxW = TC.totalWeeks || 18;
                allCourses.forEach(function(c) {
                    (c.time_slots || []).forEach(function(s) {
                        if (s.week_end && s.week_end > maxW) maxW = s.week_end;
                    });
                });
                maxWeek = maxW;
                console.log('[teacher] maxWeek=', maxWeek, 'curWeek=', curWeek);
                console.log('[teacher] 开始构建周选择器和渲染课表...');
                buildWeekSelector();
                goWeek(curWeek);
                console.log('[teacher] 渲染完成');
            })
            .catch(function(err) {
                console.error('[teacher] API 失败:', err.name, err.message, 'status=', err.status, 'data=', err.data);
                loadingEl.innerHTML = '<p class="text-danger">加载失败: ' + (err.message || '请确认已发布排课方案') + '</p>';
            });
    }

    loadTeacherCourses();
})();
</script>
</body>
</html>
