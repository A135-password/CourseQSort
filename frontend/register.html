<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册账号 — 选课系统</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light d-flex align-items-center" style="min-height:100vh;">
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow">
                <div class="card-body">
                    <h4 class="text-center mb-3">注册账号</h4>
                    <p class="text-muted small text-center mb-3">
                        请使用真实姓名注册，系统将自动绑定教务已录入的个人信息
                    </p>

                    <!-- 角色选择 -->
                    <div class="btn-group w-100 mb-3" role="group">
                        <button type="button" class="btn btn-outline-primary active" id="reg-role-student">🎓 学生注册</button>
                        <button type="button" class="btn btn-outline-info" id="reg-role-teacher">👨‍🏫 教师注册</button>
                    </div>

                    <!-- 注册表单 -->
                    <form id="register-form">
                        <div class="mb-2">
                            <label for="reg-username" class="form-label small">用户名 <span class="text-danger">*</span></label>
                            <input type="text" class="form-control form-control-sm" id="reg-username"
                                   placeholder="3-50个字符，用于登录" required minlength="3" maxlength="50">
                        </div>
                        <div class="mb-2">
                            <label for="reg-password" class="form-label small">密码 <span class="text-danger">*</span></label>
                            <input type="password" class="form-control form-control-sm" id="reg-password"
                                   placeholder="至少6位" required minlength="6">
                        </div>
                        <div class="mb-2">
                            <label for="reg-name" class="form-label small">真实姓名 <span class="text-danger">*</span></label>
                            <input type="text" class="form-control form-control-sm" id="reg-name"
                                   placeholder="请输入真实姓名（需与教务录入一致）" required>
                        </div>
                        <div class="mb-3" id="reg-identifier-group">
                            <label for="reg-identifier" class="form-label small" id="reg-identifier-label">
                                学号 <span class="text-danger">*</span>
                            </label>
                            <input type="text" class="form-control form-control-sm" id="reg-identifier"
                                   placeholder="请输入学号" required>
                            <small class="text-muted" id="reg-identifier-hint">教务已录入的学生学号</small>
                        </div>

                        <div class="d-grid mb-2">
                            <button type="submit" class="btn btn-primary" id="reg-submit-btn">注册</button>
                        </div>
                        <p class="text-danger small mt-2" id="reg-error-msg" style="display:none;"></p>
                        <p class="text-success small mt-2" id="reg-success-msg" style="display:none;"></p>
                    </form>

                    <div class="text-center mt-2">
                        <small>已有账号？<a href="login.html">返回登录</a></small>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="js/api.js"></script>
<script>
(function() {
    var currentRole = 'STUDENT'; // STUDENT | TEACHER
    var roleStudentBtn = document.getElementById('reg-role-student');
    var roleTeacherBtn = document.getElementById('reg-role-teacher');
    var identifierLabel = document.getElementById('reg-identifier-label');
    var identifierHint = document.getElementById('reg-identifier-hint');
    var identifierInput = document.getElementById('reg-identifier');

    roleStudentBtn.addEventListener('click', function() {
        currentRole = 'STUDENT';
        roleStudentBtn.className = 'btn btn-outline-primary active';
        roleTeacherBtn.className = 'btn btn-outline-info';
        identifierLabel.innerHTML = '学号 <span class="text-danger">*</span>';
        identifierHint.textContent = '教务已录入的学生学号';
        identifierInput.placeholder = '请输入学号';
    });

    roleTeacherBtn.addEventListener('click', function() {
        currentRole = 'TEACHER';
        roleStudentBtn.className = 'btn btn-outline-primary';
        roleTeacherBtn.className = 'btn btn-outline-info active';
        identifierLabel.innerHTML = '工号 <span class="text-danger">*</span>';
        identifierHint.textContent = '教务已录入的教师工号';
        identifierInput.placeholder = '请输入工号';
    });

    document.getElementById('register-form').addEventListener('submit', function(e) {
        e.preventDefault();
        var errorEl = document.getElementById('reg-error-msg');
        var successEl = document.getElementById('reg-success-msg');
        errorEl.style.display = 'none';
        successEl.style.display = 'none';

        var username = document.getElementById('reg-username').value.trim();
        var password = document.getElementById('reg-password').value.trim();
        var name = document.getElementById('reg-name').value.trim();
        var identifier = document.getElementById('reg-identifier').value.trim();

        if (!username || username.length < 3) {
            errorEl.textContent = '用户名至少3个字符'; errorEl.style.display = 'block'; return;
        }
        if (!password || password.length < 6) {
            errorEl.textContent = '密码至少6位'; errorEl.style.display = 'block'; return;
        }
        if (!name) {
            errorEl.textContent = '请输入真实姓名'; errorEl.style.display = 'block'; return;
        }
        if (!identifier) {
            errorEl.textContent = currentRole === 'STUDENT' ? '请输入学号' : '请输入工号';
            errorEl.style.display = 'block'; return;
        }

        var payload = {
            username: username,
            password: password,
            role: currentRole,
            name: name,
            identifier: identifier
        };

        var submitBtn = document.getElementById('reg-submit-btn');
        submitBtn.disabled = true;
        submitBtn.textContent = '注册中...';

        // 调用注册 API
        fetch(CourseQSortAPI.getBaseUrl() + '/auth/register/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        })
        .then(function(resp) {
            return resp.json().then(function(data) {
                return { ok: resp.ok, status: resp.status, data: data };
            });
        })
        .then(function(result) {
            submitBtn.disabled = false;
            submitBtn.textContent = '注册';

            if (result.ok) {
                // 注册成功 → 保存 token → 跳转
                var data = result.data;
                CourseQSortAPI.token.set(data.access, data.refresh);
                sessionStorage.setItem('userName', data.user.name || username);
                sessionStorage.setItem('userRole', data.user.role || currentRole);
                if (currentRole === 'TEACHER') {
                    sessionStorage.setItem('teacherName', data.user.name);
                    sessionStorage.setItem('teacherId', String(data.user.id));
                } else {
                    sessionStorage.setItem('studentName', data.user.name);
                    sessionStorage.setItem('studentId', String(data.user.id));
                }

                successEl.textContent = (data.detail || '注册成功') + '，正在跳转...';
                successEl.style.display = 'block';

                setTimeout(function() {
                    window.location.href = currentRole === 'TEACHER' ? 'teacher.html' : 'index.html';
                }, 800);
            } else {
                // 显示错误
                var msg = '';
                if (result.data) {
                    // 提取 DRF 错误信息
                    Object.keys(result.data).forEach(function(k) {
                        var v = result.data[k];
                        msg += (Array.isArray(v) ? v.join('；') : String(v)) + '\n';
                    });
                }
                errorEl.textContent = msg || ('注册失败 (HTTP ' + result.status + ')');
                errorEl.style.display = 'block';
            }
        })
        .catch(function(err) {
            submitBtn.disabled = false;
            submitBtn.textContent = '注册';
            // Mock 模式回退
            if (CourseQSortAPI.isMockMode()) {
                // Mock: 模拟注册成功
                sessionStorage.setItem('userName', name);
                sessionStorage.setItem('userRole', currentRole);
                if (currentRole === 'TEACHER') {
                    sessionStorage.setItem('teacherName', name);
                    sessionStorage.setItem('teacherId', '1');
                } else {
                    sessionStorage.setItem('studentName', name);
                    sessionStorage.setItem('studentId', identifier);
                }
                window.location.href = currentRole === 'TEACHER' ? 'teacher.html' : 'index.html';
                return;
            }
            errorEl.textContent = '网络错误，无法连接后端服务器';
            errorEl.style.display = 'block';
        });
    });
})();
</script>
</body>
</html>
