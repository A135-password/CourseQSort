<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学生选课系统 - 登录</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light d-flex align-items-center" style="height:100vh;">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <div class="card shadow">
                    <div class="card-body">
                        <h3 class="text-center mb-4">选课系统</h3>

                        <div class="btn-group w-100 mb-3" role="group">
                            <button type="button" class="btn btn-outline-primary" id="mode-jwt-btn">后端模式</button>
                            <button type="button" class="btn btn-outline-success active" id="mode-mock-btn">预览模式</button>
                        </div>
                        <p class="text-muted small text-center mb-3" id="mode-hint">使用本地模拟数据，无需后端服务</p>

                        <form id="login-form-jwt" style="display:none;">
                            <div class="mb-3">
                                <label for="username" class="form-label">用户名</label>
                                <input type="text" class="form-control" id="username" placeholder="请输入用户名" required>
                            </div>
                            <div class="mb-3">
                                <label for="password" class="form-label">密码</label>
                                <input type="password" class="form-control" id="password" placeholder="请输入密码" required>
                            </div>
                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary">登录</button>
                            </div>
                            <p class="text-danger mt-2" id="jwt-error-msg" style="display:none;"></p>
                        </form>

                        <form id="login-form-mock" style="display:block;">
                            <div class="mb-3">
                                <label for="name" class="form-label">姓名</label>
                                <input type="text" class="form-control" id="name" placeholder="请输入姓名" required>
                            </div>
                            <div class="mb-3">
                                <label for="studentId" class="form-label">学号</label>
                                <input type="text" class="form-control" id="studentId" placeholder="请输入学号" required>
                            </div>
                            <div class="d-grid">
                                <button type="submit" class="btn btn-success">预览模式进入</button>
                            </div>
                            <p class="text-danger mt-2" id="mock-error-msg" style="display:none;"></p>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        var modeJwtBtn = document.getElementById('mode-jwt-btn');
        var modeMockBtn = document.getElementById('mode-mock-btn');
        var formJwt = document.getElementById('login-form-jwt');
        var formMock = document.getElementById('login-form-mock');
        var modeHint = document.getElementById('mode-hint');

        function switchMode(mode) {
            if (mode === 'jwt') {
                modeJwtBtn.className = 'btn btn-outline-primary active';
                modeMockBtn.className = 'btn btn-outline-success';
                formJwt.style.display = 'block';
                formMock.style.display = 'none';
                modeHint.textContent = '连接后端服务器 (username + password)';
                CourseQSortAPI.setLoginMode('jwt');
            } else {
                modeJwtBtn.className = 'btn btn-outline-primary';
                modeMockBtn.className = 'btn btn-outline-success active';
                formJwt.style.display = 'none';
                formMock.style.display = 'block';
                modeHint.textContent = '使用本地模拟数据，无需后端服务';
                CourseQSortAPI.setLoginMode('mock');
            }
        }

        modeJwtBtn.addEventListener('click', function() { switchMode('jwt'); });
        modeMockBtn.addEventListener('click', function() { switchMode('mock'); });

        document.getElementById('login-form-jwt').addEventListener('submit', function(e) {
            e.preventDefault();
            var username = document.getElementById('username').value.trim();
            var password = document.getElementById('password').value.trim();
            var errorMsg = document.getElementById('jwt-error-msg');
            if (!username || !password) {
                errorMsg.textContent = '用户名和密码不能为空';
                errorMsg.style.display = 'block';
                return;
            }
            if (CourseQSortAPI.isMockMode()) {
                sessionStorage.setItem('studentName', username);
                sessionStorage.setItem('studentId', '2024' + Math.floor(1000 + Math.random() * 9000));
                window.location.href = 'index.html';
                return;
            }
            CourseQSortAPI.auth.login(username, password)
                .then(function(data) {
                    CourseQSortAPI.token.set(data.access, data.refresh);
                    sessionStorage.setItem('studentName', data.user.name || username);
                    sessionStorage.setItem('studentId', String(data.user.id || ''));
                    window.location.href = 'index.html';
                })
                .catch(function(err) {
                    if (err.status === 401) {
                        errorMsg.textContent = '用户名或密码错误';
                    } else {
                        errorMsg.textContent = '无法连接后端，请切换到"预览模式"';
                    }
                    errorMsg.style.display = 'block';
                });
        });

        document.getElementById('login-form-mock').addEventListener('submit', function(e) {
            e.preventDefault();
            var name = document.getElementById('name').value.trim();
            var studentId = document.getElementById('studentId').value.trim();
            var errorMsg = document.getElementById('mock-error-msg');
            if (!name || !studentId) {
                errorMsg.textContent = '姓名和学号不能为空';
                errorMsg.style.display = 'block';
                return;
            }
            sessionStorage.setItem('studentName', name);
            sessionStorage.setItem('studentId', studentId);
            CourseQSortAPI.setLoginMode('mock');
            window.location.href = 'index.html';
        });

        if (CourseQSortAPI.isAuthenticated()) {
            window.location.href = 'index.html';
        }

        (function() {
            fetch(CourseQSortAPI.getBaseUrl() + '/auth/login/', { method: 'HEAD' })
                .then(function() {
                    switchMode('jwt');
                    CourseQSortAPI.setMockMode(false);
                })
                .catch(function() {
                    switchMode('mock');
                });
        })();
    </script>
</body>
</html>
