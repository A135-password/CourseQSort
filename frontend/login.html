<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学生选课系统 - 登录</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light d-flex align-items-center" style="height:100vh;">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <div class="card shadow">
                    <div class="card-body">
                        <h3 class="text-center mb-4">选课系统</h3>

                        <div class="btn-group w-100 mb-2" role="group">
                            <button type="button" class="btn btn-outline-primary active" id="role-student-btn">🎓 学生端</button>
                            <button type="button" class="btn btn-outline-info" id="role-teacher-btn">👨‍🏫 教师端</button>
                            <button type="button" class="btn btn-outline-warning" id="role-admin-btn">📋 教务端</button>
                        </div>

                        <div class="btn-group w-100 mb-3" role="group">
                            <button type="button" class="btn btn-outline-primary" id="mode-jwt-btn">后端模式</button>
                            <button type="button" class="btn btn-outline-success active" id="mode-mock-btn">预览模式</button>
                        </div>
                        <p class="text-muted small text-center mb-3" id="mode-hint">使用本地模拟数据，无需后端服务</p>

                        <form id="login-form-jwt" style="display:none;">
                            <div class="mb-3">
                                <label for="username" class="form-label">用户名</label>
                                <input type="text" class="form-control" id="username" placeholder="请输入用户名" required>
                            </div>
                            <div class="mb-3">
                                <label for="password" class="form-label">密码</label>
                                <input type="password" class="form-control" id="password" placeholder="请输入密码" required>
                            </div>
                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary">登录</button>
                            </div>
                            <p class="text-danger mt-2" id="jwt-error-msg" style="display:none;"></p>
                        </form>

                        <form id="login-form-mock" style="display:block;">
                            <div id="mock-student-fields">
                                <div class="mb-3">
                                    <label for="name" class="form-label">姓名</label>
                                    <input type="text" class="form-control" id="name" placeholder="请输入姓名">
                                </div>
                                <div class="mb-3">
                                    <label for="studentId" class="form-label">学号</label>
                                    <input type="text" class="form-control" id="studentId" placeholder="请输入学号">
                                </div>
                            </div>
                            <div id="mock-admin-fields" style="display:none;">
                                <div class="mb-3">
                                    <label for="adminName" class="form-label">教务姓名</label>
                                    <input type="text" class="form-control" id="adminName" placeholder="请输入姓名（可选）">
                                </div>
                            </div>
                            <div id="mock-teacher-fields" style="display:none;">
                                <div class="mb-3">
                                    <label for="teacherSelect" class="form-label">选择教师</label>
                                    <select class="form-select" id="teacherSelect">
                                        <option value="">— 请选择教师 —</option>
                                    </select>
                                </div>
                            </div>
                            <div class="d-grid">
                                <button type="submit" class="btn btn-success" id="mock-submit-btn">预览模式进入</button>
                            </div>
                            <p class="text-danger mt-2" id="mock-error-msg" style="display:none;"></p>
                        </form>

                        <div class="text-center mt-3">
                            <small>没有账号？<a href="register.html" class="fw-bold">注册新账号</a></small>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        var modeJwtBtn = document.getElementById('mode-jwt-btn');
        var modeMockBtn = document.getElementById('mode-mock-btn');
        var formJwt = document.getElementById('login-form-jwt');
        var formMock = document.getElementById('login-form-mock');
        var modeHint = document.getElementById('mode-hint');
        var roleStudentBtn = document.getElementById('role-student-btn');
        var roleTeacherBtn = document.getElementById('role-teacher-btn');
        var roleAdminBtn = document.getElementById('role-admin-btn');
        var mockStudentFields = document.getElementById('mock-student-fields');
        var mockAdminFields = document.getElementById('mock-admin-fields');
        var mockTeacherFields = document.getElementById('mock-teacher-fields');
        var mockSubmitBtn = document.getElementById('mock-submit-btn');
        var currentRole = 'student'; // 'student' | 'teacher' | 'admin'

        // 初始化教师下拉列表
        function populateTeacherSelect() {
            var sel = document.getElementById('teacherSelect');
            CourseQSortAPI.admin.getTeachers().then(function(d) {
                var items = d.results || [];
                sel.innerHTML = '<option value="">— 请选择教师 —</option>' +
                    items.map(function(t) {
                        return '<option value="' + t.id + '" data-name="' + t.name + '" data-dept="' + (t.department || '') + '">' + t.name + '（' + (t.department || t.employee_no || '—') + '）</option>';
                    }).join('');
            }).catch(function() {
                sel.innerHTML = '<option value="">— 请选择教师 —</option><option value="1">张教授（计算机学院）</option><option value="2">李老师（计算机学院）</option><option value="3">王教授（计算机学院）</option><option value="4">赵教授（数学学院）</option><option value="5">陈老师（外国语学院）</option>';
            });
        }
        populateTeacherSelect();

        function getRedirectUrl() {
            if (currentRole === 'admin') return 'admin.html';
            if (currentRole === 'teacher') return 'teacher.html';
            return 'index.html';
        }

        // 角色配色
        var ROLE_STYLES = {
            student: { btn: 'btn-outline-primary', submit: 'btn-success', text: '预览模式进入', active: 'btn-outline-primary active' },
            teacher: { btn: 'btn-outline-info', submit: 'btn-info', text: '进入教师端', active: 'btn-outline-info active' },
            admin:   { btn: 'btn-outline-warning', submit: 'btn-warning', text: '进入教务管理端', active: 'btn-outline-warning active' }
        };

        function applyRoleStyle() {
            var s = ROLE_STYLES[currentRole];
            [roleStudentBtn, roleTeacherBtn, roleAdminBtn].forEach(function(b) { b.className = 'btn ' + s.btn; });
            if (currentRole === 'student') roleStudentBtn.className = 'btn ' + s.active;
            if (currentRole === 'teacher') roleTeacherBtn.className = 'btn ' + s.active;
            if (currentRole === 'admin') roleAdminBtn.className = 'btn ' + s.active;
            mockSubmitBtn.textContent = s.text;
            mockSubmitBtn.className = 'btn ' + s.submit;
        }

        function switchRole(role) {
            currentRole = role;
            mockStudentFields.style.display = (role === 'student') ? 'block' : 'none';
            mockTeacherFields.style.display = (role === 'teacher') ? 'block' : 'none';
            mockAdminFields.style.display = (role === 'admin') ? 'block' : 'none';
            document.getElementById('name').toggleAttribute('required', role === 'student');
            document.getElementById('studentId').toggleAttribute('required', role === 'student');
            document.getElementById('teacherSelect').toggleAttribute('required', role === 'teacher');
            applyRoleStyle();
        }

        function switchMode(mode) {
            if (mode === 'jwt') {
                modeJwtBtn.className = 'btn btn-outline-primary active';
                modeMockBtn.className = 'btn btn-outline-success';
                formJwt.style.display = 'block';
                formMock.style.display = 'none';
                modeHint.textContent = '连接后端服务器 (username + password)';
                CourseQSortAPI.setLoginMode('jwt');
                CourseQSortAPI.setMockMode(false);
            } else {
                modeJwtBtn.className = 'btn btn-outline-primary';
                modeMockBtn.className = 'btn btn-outline-success active';
                formJwt.style.display = 'none';
                formMock.style.display = 'block';
                modeHint.textContent = '使用本地模拟数据，无需后端服务';
                CourseQSortAPI.setLoginMode('mock');
                CourseQSortAPI.setMockMode(true);
            }
        }

        roleStudentBtn.addEventListener('click', function() { switchRole('student'); });
        roleTeacherBtn.addEventListener('click', function() { switchRole('teacher'); });
        roleAdminBtn.addEventListener('click', function() { switchRole('admin'); });
        modeJwtBtn.addEventListener('click', function() { switchMode('jwt'); });
        modeMockBtn.addEventListener('click', function() { switchMode('mock'); });

        document.getElementById('login-form-jwt').addEventListener('submit', function(e) {
            e.preventDefault();
            var username = document.getElementById('username').value.trim();
            var password = document.getElementById('password').value.trim();
            var errorMsg = document.getElementById('jwt-error-msg');
            errorMsg.style.display = 'none';
            if (!username || !password) {
                errorMsg.textContent = '用户名和密码不能为空';
                errorMsg.style.display = 'block';
                return;
            }
            var submitBtn = this.querySelector('button[type="submit"]');
            submitBtn.disabled = true;
            submitBtn.textContent = '登录中...';
            // 始终走 apiCall，mock 模式下由 mock 处理器验证
            console.log('[LOGIN] submit JWT form: username=' + username + ' USE_MOCK=' + CourseQSortAPI.isMockMode() + ' BASE_URL=' + CourseQSortAPI.getBaseUrl());
            CourseQSortAPI.auth.login(username, password)
                .then(function(data) {
                    console.log('[LOGIN] success: role=' + data.user.role + ' name=' + data.user.name);
                    CourseQSortAPI.token.set(data.access, data.refresh);
                    var role = data.user.role || currentRole;
                    var displayName = data.user.name || username;
                    sessionStorage.setItem('userName', displayName);
                    sessionStorage.setItem('userRole', role);
                    // 设置角色专属 key，供各页面读取
                    if (role === 'STUDENT' || role === 'student') sessionStorage.setItem('studentName', displayName);
                    if (role === 'TEACHER' || role === 'teacher') sessionStorage.setItem('teacherName', displayName);
                    if (role === 'ADMIN' || role === 'admin') sessionStorage.setItem('adminName', displayName);
                    window.location.href = getRedirectUrl();
                })
                .catch(function(err) {
                    console.error('[LOGIN] failed: status=' + err.status + ' name=' + err.name + ' message=' + err.message + ' data=', err.data);
                    submitBtn.disabled = false;
                    submitBtn.textContent = '登录';
                    errorMsg.style.display = 'block';
                    if (err.status === 401) {
                        var detail = (err.data && err.data.detail) ? err.data.detail : '';
                        if (typeof detail === 'string' && detail) {
                            errorMsg.textContent = detail;
                        } else {
                            errorMsg.textContent = '用户名或密码错误';
                        }
                    } else if (err.status === 400) {
                        errorMsg.textContent = (err.data && err.data.detail) ? err.data.detail : '请求参数有误';
                    } else if (err.name === 'TypeError' && err.message.indexOf('fetch') !== -1) {
                        errorMsg.textContent = '无法连接后端服务器，请确认后端已启动或切换到"预览模式"';
                    } else {
                        errorMsg.textContent = '登录失败，请重试';
                    }
                });
        });

        document.getElementById('login-form-mock').addEventListener('submit', function(e) {
            e.preventDefault();
            var errorMsg = document.getElementById('mock-error-msg');
            CourseQSortAPI.setLoginMode('mock');
            sessionStorage.setItem('userRole', currentRole);

            if (currentRole === 'admin') {
                var adminName = document.getElementById('adminName').value.trim() || '教务管理员';
                sessionStorage.setItem('adminName', adminName);
                window.location.href = 'admin.html';
                return;
            }

            if (currentRole === 'teacher') {
                var sel = document.getElementById('teacherSelect');
                var tid = sel.value;
                if (!tid) { errorMsg.textContent = '请选择教师'; errorMsg.style.display = 'block'; return; }
                sessionStorage.setItem('teacherId', tid);
                sessionStorage.setItem('teacherName', sel.options[sel.selectedIndex].getAttribute('data-name') || '');
                sessionStorage.setItem('teacherDept', sel.options[sel.selectedIndex].getAttribute('data-dept') || '');
                window.location.href = 'teacher.html';
                return;
            }

            var name = document.getElementById('name').value.trim();
            var studentId = document.getElementById('studentId').value.trim();
            if (!name || !studentId) {
                errorMsg.textContent = '姓名和学号不能为空';
                errorMsg.style.display = 'block';
                return;
            }
            sessionStorage.setItem('studentName', name);
            sessionStorage.setItem('studentId', studentId);
            window.location.href = 'index.html';
        });

        if (CourseQSortAPI.isAuthenticated()) {
            window.location.href = 'index.html';
        }

        (function() {
            fetch(CourseQSortAPI.getBaseUrl() + '/auth/login/', { method: 'HEAD' })
                .then(function() { switchMode('jwt'); CourseQSortAPI.setMockMode(false); })
                .catch(function() { switchMode('mock'); });
        })();
    </script>
</body>
</html>
