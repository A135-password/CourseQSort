<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教务管理端</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.bootcdn.net/ajax/libs/bootstrap-icons/1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- 侧边栏 -->
            <div class="col-md-2 bg-dark text-white p-0 vh-100" id="admin-sidebar">
                <div class="p-3 border-bottom border-secondary">
                    <h5 class="mb-0">教务管理端</h5>
                    <small class="text-muted" id="admin-mode-badge">预览模式</small>
                </div>
                <nav class="nav flex-column p-2" id="admin-nav">
                    <a class="nav-link text-white active" data-section="dashboard" href="#">
                        <i class="bi bi-speedometer2"></i> 概览
                    </a>
                    <a class="nav-link text-white" data-section="courses" href="#">
                        <i class="bi bi-book"></i> 课程管理
                    </a>
                    <a class="nav-link text-white" data-section="resources" href="#">
                        <i class="bi bi-building"></i> 基础资源
                    </a>
                    <a class="nav-link text-white" data-section="protected-slots" href="#">
                        <i class="bi bi-shield-check"></i> 辅修时段
                    </a>
                    <a class="nav-link text-white" data-section="scheduling" href="#">
                        <i class="bi bi-calendar-check"></i> 排课方案
                    </a>
                    <a class="nav-link text-white" data-section="conflict" href="#">
                        <i class="bi bi-exclamation-triangle"></i> 冲突分析
                    </a>
                    <a class="nav-link text-white" data-section="algorithm" href="#">
                        <i class="bi bi-sliders"></i> 算法参数
                    </a>
                    <hr class="border-secondary">
                    <a class="nav-link text-muted small" href="index.html">
                        <i class="bi bi-arrow-left"></i> 返回学生端
                    </a>
                    <a class="nav-link text-muted small" href="#" id="admin-logout-btn">
                        <i class="bi bi-box-arrow-right"></i> 退出
                    </a>
                </nav>
            </div>

            <!-- 主内容区 -->
            <div class="col-md-10 p-4" id="admin-content">
                <!-- 概览 -->
                <div class="admin-section" id="section-dashboard">
                    <h4 class="mb-3">概览</h4>
                    <div class="row g-3" id="dashboard-cards"></div>
                    <div class="card mt-3"><div class="card-body text-muted small" id="dashboard-hint"></div></div>
                </div>

                <!-- 课程管理 -->
                <div class="admin-section d-none" id="section-courses">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h4 class="mb-0">课程管理</h4>
                        <div>
                            <button class="btn btn-success btn-sm me-2" id="course-import-btn">导入Excel</button>
                            <button class="btn btn-primary btn-sm" id="course-add-btn">新增课程</button>
                        </div>
                    </div>
                    <input type="text" class="form-control form-control-sm mb-2" id="course-search" placeholder="搜索课程名称或编号..." style="max-width:300px;">
                    <div class="table-responsive"><table class="table table-hover table-sm"><thead><tr><th>名称</th><th>编号</th><th>学分</th><th>教师</th><th>专业</th><th>容量</th><th>类别</th><th>操作</th></tr></thead><tbody id="admin-course-list"></tbody></table></div>
                    <nav><ul class="pagination pagination-sm" id="admin-course-pagination"></ul></nav>
                </div>

                <!-- 基础资源 -->
                <div class="admin-section d-none" id="section-resources">
                    <h4 class="mb-3">基础资源</h4>
                    <ul class="nav nav-tabs mb-3" id="resource-tabs">
                        <li class="nav-item"><a class="nav-link active" data-resource="teachers" href="#">教师</a></li>
                        <li class="nav-item"><a class="nav-link" data-resource="classrooms" href="#">教室</a></li>
                        <li class="nav-item"><a class="nav-link" data-resource="majors" href="#">专业</a></li>
                    </ul>
                    <div id="resource-content"><div class="table-responsive"><table class="table table-sm"><tbody id="resource-table-body"></tbody></table></div></div>
                </div>

                <!-- 辅修时段 -->
                <div class="admin-section d-none" id="section-protected-slots">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h4 class="mb-0">辅修时段保护</h4>
                        <div>
                            <button class="btn btn-outline-secondary btn-sm me-2" id="protected-batch-btn">批量更新</button>
                            <button class="btn btn-primary btn-sm" id="protected-add-btn">新增时段</button>
                        </div>
                    </div>
                    <div class="table-responsive"><table class="table table-sm"><thead><tr><th>星期</th><th>时段</th><th>惩罚权重</th><th>说明</th><th>操作</th></tr></thead><tbody id="protected-slots-list"></tbody></table></div>
                    <p class="text-muted small">惩罚权重 0~10，越大则排课算法越倾向避开该时段</p>
                </div>

                <!-- 排课方案 -->
                <div class="admin-section d-none" id="section-scheduling">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h4 class="mb-0">排课方案</h4>
                        <div>
                            <button class="btn btn-warning btn-sm" id="schedule-generate-btn">生成新方案</button>
                        </div>
                    </div>
                    <div id="schedule-task-status" class="alert d-none"></div>
                    <div class="table-responsive"><table class="table table-hover table-sm"><thead><tr><th>方案名称</th><th>学期</th><th>状态</th><th>评分</th><th>创建时间</th><th>操作</th></tr></thead><tbody id="schedule-plans-list"></tbody></table></div>
                </div>

                <!-- 冲突分析 -->
                <div class="admin-section d-none" id="section-conflict">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h4 class="mb-0">冲突预分析</h4>
                        <button class="btn btn-danger btn-sm" id="conflict-run-btn">运行分析</button>
                    </div>
                    <div id="conflict-task-status" class="alert d-none"></div>
                    <div class="table-responsive"><table class="table table-sm"><thead><tr><th>批次数</th><th>学期</th><th>课程数</th><th>冲突对数</th><th>阈值</th><th>时间</th><th>操作</th></tr></thead><tbody id="conflict-results-list"></tbody></table></div>
                    <div id="conflict-chart-area" class="mt-3"></div>
                </div>

                <!-- 算法参数 -->
                <div class="admin-section d-none" id="section-algorithm">
                    <h4 class="mb-3">算法参数配置</h4>
                    <div class="row g-3" id="algorithm-config-form"></div>
                    <button class="btn btn-primary mt-3" id="algorithm-save-btn">保存配置</button>
                    <div id="algorithm-save-status" class="mt-2 small"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 课程编辑弹窗 -->
    <div class="modal fade" id="course-modal" tabindex="-1"><div class="modal-dialog"><div class="modal-content">
        <div class="modal-header"><h5 class="modal-title" id="course-modal-title">新增课程</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
        <div class="modal-body" id="course-modal-body"></div>
        <div class="modal-footer"><button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button><button type="button" class="btn btn-primary" id="course-modal-save">保存</button></div>
    </div></div></div>

    <!-- 时段编辑弹窗 -->
    <div class="modal fade" id="slot-modal" tabindex="-1"><div class="modal-dialog"><div class="modal-content">
        <div class="modal-header"><h5 class="modal-title">编辑时段</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
        <div class="modal-body" id="slot-modal-body"></div>
        <div class="modal-footer"><button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button><button type="button" class="btn btn-primary" id="slot-modal-save">保存</button></div>
    </div></div></div>

    <script src="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.0/js/bootstrap.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
