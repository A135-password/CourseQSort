name: Backend CI

on:
  push:
    paths:
      - '.github/workflows/backend-ci.yml'
      - 'backend/**'
  pull_request:
    paths:
      - '.github/workflows/backend-ci.yml'
      - 'backend/**'
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install system packages for mysqlclient
        run: |
          sudo apt-get update
          sudo apt-get install -y default-libmysqlclient-dev build-essential pkg-config

      - name: Install Python dependencies
        run: python -m pip install --upgrade pip

      - name: Install development requirements
        run: python -m pip install -r requirements-dev.txt

      - name: Check import ordering
        run: python -m isort apps config manage.py --check-only

      - name: Check formatting
        run: python -m black apps config manage.py --check

      - name: Run flake8
        run: python -m flake8 apps config manage.py --jobs=1

  test:
    runs-on: ubuntu-latest
    needs: quality
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install system packages for mysqlclient
        run: |
          sudo apt-get update
          sudo apt-get install -y default-libmysqlclient-dev build-essential pkg-config

      - name: Install Python dependencies
        run: python -m pip install --upgrade pip

      - name: Install development requirements
        run: python -m pip install -r requirements-dev.txt

      - name: Check for missing migrations
        run: python manage.py makemigrations --check --dry-run

      - name: Django system check
        run: python manage.py check

      - name: Run pytest with coverage
        run: python -m pytest

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-xml
          path: backend/coverage.xml
